name: Sign beckn-constants

on:
  push:
    branches: [main]
    paths:
      - pkg/config/beckn-constants.yaml

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Sign constants file
        env:
          BECKN_SIGNING_KEY: ${{ secrets.BECKN_CONSTANTS_SIGNING_KEY }}
        run: |
          echo "$BECKN_SIGNING_KEY" > /tmp/beckn_private.key
          go run ./tools/sign sign \
            --key /tmp/beckn_private.key \
            --input pkg/config/beckn-constants.yaml \
            --output pkg/config/beckn-constants.yaml.sig
          rm -f /tmp/beckn_private.key

      - name: Commit updated signature
        run: |
          git config user.name "beckn-bot"
          git config user.email "bot@becknprotocol.io"
          git add pkg/config/beckn-constants.yaml.sig
          git diff --cached --quiet || git commit -m "chore: re-sign beckn-constants.yaml [skip ci]"
          git push
