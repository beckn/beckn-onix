# Prometheus — node-level scrape config.
# Used only when docker-compose.with-telemetry.yml overlay is active.
# Scrapes BAP and BPP companion collectors only; the network-level collector is not scraped here.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "otel-collector-bap"
    static_configs:
      - targets: ["otel-collector-bap:8889"]
    metrics_path: /metrics

  - job_name: "otel-collector-bpp"
    static_configs:
      - targets: ["otel-collector-bpp:8891"]
    metrics_path: /metrics
