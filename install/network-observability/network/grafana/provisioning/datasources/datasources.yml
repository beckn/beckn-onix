# Grafana datasources for the network-level stack.
# No Jaeger — that is a node-level (app pipeline) backend.
apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Zipkin
    uid: zipkin
    type: zipkin
    access: proxy
    url: http://zipkin:9411
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
