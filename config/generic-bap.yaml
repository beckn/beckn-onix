appName: "onix-generic-bap"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transactionId
    - messageId
http:
  port: 8081
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins

# OpenTelemetry (OTLP) - metrics and traces sent to OTEL collector
plugins:
  otelsetup:
    id: otelsetup
    config:
      serviceName: "onix-bap"
      serviceVersion: "1.0.0"
      environment: "development"
      domain: "generic"
      otlpEndpoint: "otel-collector-bap:4317"
      enableMetrics: "true"
      networkMetricsGranularity: "2min"
      networkMetricsFrequency: "4min"
      enableTracing: "true"
      enableLogs: "true"
      timeInterval: "5"
      auditFieldsConfig: "/app/config/audit-fields.yaml"

modules:
  # ─────────────────────────────────────────────────────────────────
  # BAP Receiver  — accepts on_* callbacks from BPPs
  # Listens at:  http://localhost:8081/bap/receiver/
  # ─────────────────────────────────────────────────────────────────
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      subscriberId: bap.example.com
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            # registryName is a constant for all NFH/Beckn networks
            registryName: subscribers.beckn.one
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            # Testnet sandbox subscriber registered on beckn.one/testnet
            # Replace with your own registered subscriber ID and keys for production
            networkParticipant: bap.example.com
            keyId: 76EU7LZ7gfqj13dWDKR1Uitnim11mCoxWBPdzLxUpAMBPVdANKgyFM
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        cache:
          id: cache
          config:
            addr: redis:6379
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/generic-routing-BAPReceiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transactionId,messageId
              role: bap
      steps:
        - validateSign
        - addRoute
        - validateSchema

  # ─────────────────────────────────────────────────────────────────
  # BAP Caller  — forwards outbound BAP requests to BPPs / CDS
  # Listens at:  http://localhost:8081/bap/caller/
  # Postman bap_adapter_url = http://localhost:8081/bap/caller
  # ─────────────────────────────────────────────────────────────────
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      subscriberId: bap.example.com
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            # registryName is a constant for all NFH/Beckn networks
            registryName: subscribers.beckn.one
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: bap.example.com
            keyId: 76EU7LZ7gfqj13dWDKR1Uitnim11mCoxWBPdzLxUpAMBPVdANKgyFM
            signingPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            signingPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
            encrPrivateKey: TTQMAEy0xJcoRXRNofZAwZq1c3VH6j98UUaHP7budQQ=
            encrPublicKey: g/3swjI93IhZ0SScrVZapeLjU+W0AeiSid3LViYZJFo=
        cache:
          id: cache
          config:
            addr: redis:6379
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        router:
          id: router
          config:
            routingConfig: ./config/generic-routing-BAPCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transactionId,messageId
              role: bap
      steps:
        - addRoute
        - sign
        - validateSchema
